<!doctype html><html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="./css/brand.css">
<style>
  .app{min-height:100vh}
  .mk-kind{color:var(--p-text)}
  .mode-word{font-size:30px;font-weight:800;color:var(--ink);text-align:center;margin:18px 0 6px}
  .mode-sub{text-align:center;color:var(--muted);font-weight:600;margin-bottom:16px}
  .pair-grid{display:flex;gap:10px}
  .pair-col{flex:1;display:flex;flex-direction:column;gap:8px}
  .pair-item{background:var(--card);border:2px solid transparent;border-radius:12px;padding:13px 12px;font-weight:700;
    color:var(--ink);box-shadow:0 2px 10px var(--shadow);text-align:center;font-size:14px}
  .pair-item.sel{border-color:var(--purple)}
  .pair-item.ok{border-color:var(--ok);color:var(--muted);opacity:.6}
  .hint-ru{text-align:center;color:var(--muted);font-weight:700;margin-top:10px}
</style></head><body><div class="app"><main id="view"></main></div>
<script>
const m = new URLSearchParams(location.search).get('m') || 'choose';
const TITLES = { choose:'Выбор перевода', match:'Найди пару', cloze:'Впиши в предложение', type:'Впечатай слово' };
function seg(n,done){ let s=''; for(let i=0;i<n;i++) s+='<i class="'+(i<done?'on':'')+'"></i>'; return s; }
function head(count){ return '<div class="round-top"><div class="drill-bar"><button class="drill-x">✕</button>'+
  '<div class="drill-title">Лексика · '+TITLES[m]+'</div><div class="drill-count">'+count+'</div></div>'+
  '<div class="seg-bar">'+seg(15,4)+'</div></div>'; }

let body='';
if(m==='choose'){
  body='<div class="round-body"><div class="task-kind mk-kind">Выбери перевод</div>'+
    '<div class="mode-word">to keep a pet</div>'+
    '<div class="mc-list">'+
      '<button class="mc-opt">держать питомца</button>'+
      '<button class="mc-opt">кормить птиц</button>'+
      '<button class="mc-opt">ходить в поход</button>'+
      '<button class="mc-opt">мыть посуду</button>'+
    '</div></div>';
}
if(m==='match'){
  body='<div class="round-body"><div class="task-kind mk-kind">Соедини пары EN ↔ RU</div>'+
    '<div class="pair-grid" style="margin-top:14px">'+
      '<div class="pair-col">'+
        '<div class="pair-item ok">to keep a pet ✓</div>'+
        '<div class="pair-item sel">wild animal</div>'+
        '<div class="pair-item">endangered species</div>'+
        '<div class="pair-item">animal shelter</div>'+
      '</div>'+
      '<div class="pair-col">'+
        '<div class="pair-item ok">держать питомца ✓</div>'+
        '<div class="pair-item">приют для животных</div>'+
        '<div class="pair-item">исчезающий вид</div>'+
        '<div class="pair-item">дикое животное</div>'+
      '</div>'+
    '</div></div>';
}
if(m==='cloze'){
  body='<div class="round-body"><div class="task-kind mk-kind">Впиши пропущенное слово</div>'+
    '<div class="task-text" style="margin-top:14px">Many families <u>&nbsp;&nbsp;?&nbsp;&nbsp;</u> to teach their children responsibility.</div>'+
    '<div class="hint-ru">подсказка: держать питомца</div>'+
    '<div class="answer-wrap"><input class="answer-input" placeholder="keep a pet"></div></div>';
}
if(m==='type'){
  body='<div class="round-body"><div class="task-kind mk-kind">Впечатай по-английски</div>'+
    '<div class="mode-word">держать питомца</div>'+
    '<div class="mode-sub">A family often does this to teach kids responsibility</div>'+
    '<div class="answer-wrap"><input class="answer-input" placeholder="type in English…"></div></div>';
}
document.getElementById('view').innerHTML =
  '<div class="round view">'+head(m==='match'?'2 / 8':'5 / 15')+body+
  '<div class="round-foot"><button class="btn btn-check">Проверить</button></div></div>';
</script></body></html>
