:root {

.page { display: none; padding: 16px 16px 80px; max-width: 680px; margin: 0 auto; }
.page.active { display: block; }
.tracker-header { margin-bottom: 16px; }
.tracker-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.tracker-sub { font-size: 13px; color: var(--g4); }
.tracker-progress { background: var(--g2); border-radius: 4px; height: 6px; margin: 12px 0 4px; }
.tracker-progress-fill { height: 100%; background: var(--black); border-radius: 4px; transition: width .5s; }
.tracker-pct { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--g4); text-align: right; }
.tracker-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 20px; }
.tracker-day { aspect-ratio: 1; border: 1.5px solid var(--g2); border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; font-size: 11px; font-family: 'IBM Plex Mono', monospace; }
.tracker-day:hover { border-color: var(--black); }

.tracker-day.future { opacity: .4; cursor: default; }
.tracker-day-num { font-size: 13px; font-weight: 700; }

const STORAGE_KEY='oge_grammar_tracker';
let state=loadState();
let currentVariant=null,currentDay=null,checked=false;

function loadState(){try{const s=localStorage.getItem(STORAGE_KEY);return s?JSON.parse(s):{days:{},startDate:new Date().toISOString().split('T')[0]};}catch(e){return{days:{},startDate:new Date().toISOString().split('T')[0]};}}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}

(function init(){renderTracker();updateTodayCard();})();

function gotoPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(btn)btn.classList.add('active');
  if(id==='tracker'){renderTracker();updateTodayCard();}
}

function renderTracker(){
  const grid=document.getElementById('tracker-grid');grid.innerHTML='';
  const today=new Date();const start=new Date(state.startDate);
  let doneDays=0,totalScore=0,scoreCount=0,streak=0,streakActive=true;
  for(let i=0;i<30;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const key=d.toISOString().split('T')[0];
    const dd=state.days[key]||{};
    const isToday=key===today.toISOString().split('T')[0];
    const isFuture=d>today;
    const v1done=dd.v1!==undefined,v2done=dd.v2!==undefined,bothDone=v1done&&v2done;
    if(bothDone){doneDays++;if(streakActive)streak++;}else if(!isToday&&!isFuture)streakActive=false;
    if(v1done){totalScore+=dd.v1;scoreCount++;}if(v2done){totalScore+=dd.v2;scoreCount++;}
    const div=document.createElement('div');
    div.className='tracker-day'+(isToday?' today':'')+(bothDone?' done':(v1done||v2done)?' partial':isFuture?' future':'');
    const score=bothDone?Math.round((dd.v1+dd.v2)/2):'';
    div.innerHTML='<div class="tracker-day-num">'+(i+1)+'</div><div class="tracker-day-score">'+(bothDone?score+'/15':v1done||v2done?'...':'')+'</div>';
    if(!isFuture)div.onclick=()=>selectDay(key,i+1);
    grid.appendChild(div);
  }
  const pct=Math.round(doneDays/30*100);
  document.getElementById('tracker-fill').style.width=pct+'%';
  document.getElementById('tracker-pct').textContent=pct+'% выполнено';
  document.getElementById('stat-done').textContent=doneDays;
  document.getElementById('stat-avg').textContent=scoreCount?Math.round(totalScore/scoreCount):'-';
  document.getElementById('stat-streak').textContent=streak;
}

function updateTodayCard(){
  const today=new Date().toISOString().split('T')[0];
  const start=new Date(state.startDate);
  const diff=Math.floor((new Date(today)-start)/(1000*60*60*24));
  const dayNum=diff+1;if(dayNum<1||dayNum>30)return;
  const v1idx=((dayNum-1)*2)%10+1;const v2idx=((dayNum-1)*2+1)%10+1;
  document.getElementById('today-title').textContent='День '+dayNum;
  document.getElementById('today-sub').textContent='Варианты '+v1idx+' и '+v2idx;
  const dd=state.days[today]||{};
  const b1=document.getElementById('v-btn-1'),b2=document.getElementById('v-btn-2');
  b1.textContent='Вариант '+v1idx+(dd.v1!==undefined?' ok '+dd.v1+'/15':'');
  b2.textContent='Вариант '+v2idx+(dd.v2!==undefined?' ok '+dd.v2+'/15':'');
  b1.className='variant-btn'+(dd.v1!==undefined?' done':'');
  b2.className='variant-btn'+(dd.v2!==undefined?' done':'');
  b1.onclick=()=>startVariantForDay(v1idx,today,'v1');
  b2.onclick=()=>startVariantForDay(v2idx,today,'v2');
  if(dd.v1!==undefined&&dd.v2!==undefined){document.getElementById('today-badge').textContent='Выполнено ok';document.getElementById('today-badge').className='day-card-badge done';}
}

function selectDay(key,dayNum){
  const v1idx=((dayNum-1)*2)%10+1;const v2idx=((dayNum-1)*2+1)%10+1;
  document.getElementById('today-title').textContent='День '+dayNum;
  document.getElementById('today-sub').textContent='Варианты '+v1idx+' и '+v2idx;
  const dd=state.days[key]||{};
  const b1=document.getElementById('v-btn-1'),b2=document.getElementById('v-btn-2');
  b1.textContent='Вариант '+v1idx+(dd.v1!==undefined?' ok '+dd.v1+'/15':'');
  b2.textContent='Вариант '+v2idx+(dd.v2!==undefined?' ok '+dd.v2+'/15':'');
  b1.className='variant-btn'+(dd.v1!==undefined?' done':'');
  b2.className='variant-btn'+(dd.v2!==undefined?' done':'');
  b1.onclick=()=>startVariantForDay(v1idx,key,'v1');
  b2.onclick=()=>startVariantForDay(v2idx,key,'v2');
  document.getElementById('today-card').scrollIntoView({behavior:'smooth'});
}

function startVariantForDay(variantId,dateKey,vkey){
  currentVariant=VARIANTS.find(v=>v.id===variantId);
  currentDay={dateKey,vkey};checked=false;
  document.getElementById('practice-title').textContent='Вариант '+variantId+' - '+currentVariant.topic;
  renderTasks();
  document.getElementById('result-banner').classList.remove('on');
  document.getElementById('done-btn').style.display='none';
  document.getElementById('check-btn').style.display='block';
  document.getElementById('check-btn').disabled=false;
  gotoPage('practice',document.querySelectorAll('.nav-tab')[1]);
  window.scrollTo(0,0);
}

function renderTasks(){
  renderSection('grammar-text',currentVariant.grammar);
  renderSection('lexis-text',currentVariant.lexis);
}

function renderSection(elId,section){
  const el=document.getElementById(elId);
  const sentences=section.text.split('\n\n');
  let html='';
  section.tasks.forEach((task,i)=>{
    const s=sentences[i]||'';
    const sentHtml=s.replace('['+task.num+']','<span style="color:var(--g3)">['+task.num+']</span>');
    html+='<div class="task-sentence"><div class="task-num">'+task.num+'</div><div class="task-body"><div>'+sentHtml+' <span class="task-base">'+task.base+'</span></div><input class="task-input" id="inp-'+task.num+'" type="text" placeholder="ваш ответ..." autocorrect="off" autocapitalize="none" spellcheck="false"><div class="task-feedback" id="fb-'+task.num+'"><div class="task-answer" id="ans-'+task.num+'"></div><div class="task-explain" id="exp-'+task.num+'"></div></div></div></div>';
  });
  el.innerHTML=html;
}

function checkAnswers(){
  if(checked)return;checked=true;
  document.getElementById('check-btn').disabled=true;
  const allTasks=[...currentVariant.grammar.tasks,...currentVariant.lexis.tasks];
  let correct=0;
  allTasks.forEach(task=>{
    const input=document.getElementById('inp-'+task.num);
    const fbEl=document.getElementById('fb-'+task.num);
    const ansEl=document.getElementById('ans-'+task.num);
    const expEl=document.getElementById('exp-'+task.num);
    if(!input)return;
    const userAns=input.value.trim().toLowerCase().replace(/'/g,"'");
    const correctAnswers=Array.isArray(task.answer)?task.answer.map(a=>a.toLowerCase().replace(/'/g,"'")):  [task.answer.toLowerCase().replace(/'/g,"'")];
    const isCorrect=correctAnswers.some(a=>userAns===a);
    input.className='task-input '+(isCorrect?'correct':'wrong');
    input.disabled=true;
    fbEl.className='task-feedback on '+(isCorrect?'correct':'wrong');
    ansEl.textContent=isCorrect?'Верно!':'Ответ: '+(Array.isArray(task.answer)?task.answer[0]:task.answer);
    expEl.textContent=task.explain;
    if(isCorrect)correct++;
  });
  const pct=correct/15;
  const cls=pct>=0.8?'g':pct>=0.5?'m':'b';
  const banner=document.getElementById('result-banner');
  banner.className='result-banner on '+(pct>=0.8?'perfect':pct>=0.5?'good':'bad');
  document.getElementById('res-score').textContent=correct;
  document.getElementById('res-score').className='result-score-big '+cls;
  const msgs={g:'Отлично! Отличный результат.',m:'Неплохо, есть над чем поработать.',b:'Нужно повторить материал.'};
  document.getElementById('res-msg').textContent=msgs[cls];
  document.getElementById('res-msg').className='result-msg '+cls;
  document.getElementById('done-btn').style.display='block';
  document.getElementById('check-btn').style.display='none';
  if(currentDay){
    if(!state.days[currentDay.dateKey])state.days[currentDay.dateKey]={};
    state.days[currentDay.dateKey][currentDay.vkey]=correct;
    saveState();
  }
  banner.scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
